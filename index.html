<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlesProduction — Neon Space QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root{
    --bg:#050713;
    --panel: rgba(10,14,28,.62);
    --text:#EAF0FF;
    --muted:#A6B0CC;
    --line: rgba(255,255,255,.10);
    --shadow: 0 20px 70px rgba(0,0,0,.55);

    --c1:#7C3AED;  /* violet */
    --c2:#22D3EE;  /* cyan */
    --c3:#34D399;  /* emerald */
    --c4:#F472B6;  /* pink */
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    color: var(--text);
    background: radial-gradient(1200px 800px at 20% 10%, rgba(124,58,237,.18), transparent 55%),
                radial-gradient(1000px 700px at 80% 30%, rgba(34,211,238,.16), transparent 55%),
                radial-gradient(1000px 700px at 50% 85%, rgba(52,211,153,.10), transparent 60%),
                var(--bg);
    overflow-x:hidden;
  }

  /* ====== SPACE BACKGROUND LAYERS ====== */
  .space{
    position:fixed; inset:0;
    z-index:-3;
    pointer-events:none;
  }

  /* Stars: 3 parallax layers */
  .stars, .stars2, .stars3{
    position:absolute; inset:-200px;
    background-repeat: repeat;
    opacity:.85;
    filter: drop-shadow(0 0 6px rgba(255,255,255,.12));
    animation: drift 90s linear infinite;
    transform: translateZ(0);
  }
  .stars{
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.85) 50%, transparent 51%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,.65) 50%, transparent 51%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.75) 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 80% 85%, rgba(255,255,255,.60) 50%, transparent 51%);
    background-size: 260px 260px;
  }
  .stars2{
    opacity:.55;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,.60) 50%, transparent 51%),
      radial-gradient(1px 1px at 65% 75%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 25% 70%, rgba(255,255,255,.60) 50%, transparent 51%);
    background-size: 340px 340px;
    animation-duration: 120s;
  }
  .stars3{
    opacity:.35;
    background-image:
      radial-gradient(1px 1px at 20% 10%, rgba(255,255,255,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,.50) 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.45) 50%, transparent 51%),
      radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,.45) 50%, transparent 51%);
    background-size: 420px 420px;
    animation-duration: 160s;
  }

  @keyframes drift{
    from{ transform: translate3d(0,0,0); }
    to{ transform: translate3d(-180px, 120px, 0); }
  }

  /* Twinkle overlay */
  .twinkle{
    position:absolute; inset:0;
    background:
      radial-gradient(700px 450px at 15% 20%, rgba(255,255,255,.06), transparent 60%),
      radial-gradient(600px 400px at 85% 30%, rgba(255,255,255,.05), transparent 62%),
      radial-gradient(800px 520px at 45% 90%, rgba(255,255,255,.04), transparent 64%);
    animation: tw 6s ease-in-out infinite;
    opacity:.9;
  }
  @keyframes tw{
    0%,100%{ opacity:.55; }
    50%{ opacity:1; }
  }

  /* Planets */
  .planet{
    position:absolute;
    border-radius:50%;
    filter: drop-shadow(0 25px 50px rgba(0,0,0,.55));
    transform: translateZ(0);
    opacity:.95;
  }
  .planet.p1{
    width: 220px; height:220px;
    left: -60px; top: 22%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 40%),
      radial-gradient(circle at 70% 70%, rgba(0,0,0,.25), transparent 55%),
      radial-gradient(circle at 45% 55%, rgba(34,211,238,.55), rgba(124,58,237,.25) 55%, rgba(0,0,0,.15) 75%);
    animation: float1 18s ease-in-out infinite;
  }
  .planet.p1::after{
    content:"";
    position:absolute; inset: -18px -24px;
    border-radius: 50%;
    border: 2px solid rgba(34,211,238,.22);
    transform: rotate(-18deg);
    box-shadow: 0 0 24px rgba(34,211,238,.18);
  }

  .planet.p2{
    width: 160px; height:160px;
    right: -50px; top: 12%;
    background:
      radial-gradient(circle at 25% 25%, rgba(255,255,255,.35), transparent 38%),
      radial-gradient(circle at 65% 65%, rgba(0,0,0,.22), transparent 55%),
      radial-gradient(circle at 40% 60%, rgba(244,114,182,.55), rgba(34,211,238,.22) 55%, rgba(0,0,0,.18) 78%);
    animation: float2 22s ease-in-out infinite;
  }

  .planet.p3{
    width: 260px; height:260px;
    right: 12%; bottom: -130px;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,.28), transparent 40%),
      radial-gradient(circle at 75% 70%, rgba(0,0,0,.22), transparent 58%),
      radial-gradient(circle at 45% 55%, rgba(52,211,153,.35), rgba(124,58,237,.18) 60%, rgba(0,0,0,.18) 80%);
    animation: float3 26s ease-in-out infinite;
    opacity:.9;
  }

  @keyframes float1{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    50%{ transform: translate(18px, -22px) rotate(6deg); }
  }
  @keyframes float2{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    50%{ transform: translate(-16px, 20px) rotate(-7deg); }
  }
  @keyframes float3{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    50%{ transform: translate(10px, -18px) rotate(5deg); }
  }

  /* ====== LAYOUT ====== */
  .wrap{
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 42px 18px;
  }

  .panel{
    width: min(520px, 100%);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    position:relative;
  }

  /* ====== NEON MOVING BORDER (reusable) ====== */
  .neon-border{
    position:relative;
    border-radius: 22px;
  }
  .neon-border::before{
    content:"";
    position:absolute; inset:-2px;
    border-radius: inherit;
    background: conic-gradient(
      from 0deg,
      var(--c2),
      var(--c1),
      var(--c4),
      var(--c3),
      var(--c2)
    );
    filter: blur(10px);
    opacity: .55;
    animation: spin 3.8s linear infinite;
    z-index:-2;
  }
  .neon-border::after{
    content:"";
    position:absolute; inset:-1px;
    border-radius: inherit;
    background: conic-gradient(
      from 0deg,
      rgba(34,211,238,.95),
      rgba(124,58,237,.95),
      rgba(244,114,182,.95),
      rgba(52,211,153,.95),
      rgba(34,211,238,.95)
    );
    animation: spin 2.8s linear infinite;
    z-index:-1;
    opacity:.85;
    mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    padding: 2px;
    box-sizing: border-box;
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  @keyframes spin{
    to{ transform: rotate(360deg); }
  }

  /* header */
  .head{
    display:flex;
    gap:12px;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom: 14px;
  }
  .title{
    text-align:left;
    line-height:1.1;
  }
  .title h1{
    margin:0;
    font-size: 20px;
    letter-spacing:.2px;
  }
  .title p{
    margin: 8px 0 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .badge{
    font-size:12px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: rgba(234,240,255,.92);
    white-space:nowrap;
  }

  .field{
    display:flex;
    gap:10px;
    margin-top: 14px;
  }
  input{
    flex:1;
    width:100%;
    padding: 12px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.30);
    color: var(--text);
    outline: none;
    font-size: 15px;
  }
  input::placeholder{ color: rgba(166,176,204,.75); }
  input:focus{
    border-color: rgba(34,211,238,.55);
    box-shadow: 0 0 0 4px rgba(34,211,238,.12);
  }

  .btns{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top: 12px;
  }
  button{
    flex:1;
    min-width: 120px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 14px;
    cursor:pointer;
    font-weight: 700;
    letter-spacing:.2px;
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
  }
  button:hover{
    transform: translateY(-1px);
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.18);
  }
  button:active{ transform: translateY(0); }

  .primary{
    background: linear-gradient(135deg, rgba(34,211,238,.20), rgba(124,58,237,.20));
    border-color: rgba(34,211,238,.35);
  }

  /* QR box with its own neon border */
  .qrwrap{
    margin-top: 16px;
    padding: 14px;
    border-radius: 18px;
    background: rgba(0,0,0,.28);
    border:1px solid rgba(255,255,255,.10);
    text-align:center;
  }
  #qrcode{
    display:inline-block;
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 14px 40px rgba(0,0,0,.45);
  }
  #qrcode img, #qrcode canvas{
    display:block;
    border-radius: 10px;
  }

  .status{
    margin-top: 10px;
    font-size: 13px;
    color: rgba(166,176,204,.95);
    min-height: 18px;
  }

  /* success check animation */
  .check{
    width: 58px; height:58px;
    margin: 8px auto 0;
    border-radius: 50%;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(52,211,153,.12);
    border: 1px solid rgba(52,211,153,.35);
    box-shadow: 0 0 30px rgba(52,211,153,.18);
  }
  .check svg{
    width: 30px; height:30px;
    stroke: rgba(52,211,153,.95);
    stroke-width: 3.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 48;
    stroke-dashoffset: 48;
    animation: draw .55s ease forwards;
  }
  @keyframes draw{
    to{ stroke-dashoffset: 0; }
  }

  .foot{
    margin-top: 16px;
    color: rgba(166,176,204,.75);
    font-size: 12px;
    text-align:center;
  }

  @media (max-width:420px){
    .panel{ padding: 18px; }
    button{ min-width: 0; }
  }

  @media print{
    body{ background:#fff; color:#000; }
    .space, .head, .field, .btns, .status, .foot{ display:none !important; }
    .panel{ box-shadow:none; border:none; background:transparent; }
    .qrwrap{ border:none; background:transparent; }
    #qrcode{ box-shadow:none; }
  }
</style>
</head>

<body>
  <!-- SPACE BACKGROUND -->
  <div class="space">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    <div class="twinkle"></div>
    <div class="planet p1"></div>
    <div class="planet p2"></div>
    <div class="planet p3"></div>
  </div>

  <div class="wrap">
    <div class="neon-border">
      <div class="panel">
        <div class="head">
          <div class="title">
            <h1>QR Code Generator</h1>
            <p>Neon border + Space animation • siap untuk absensi / tiket / inventaris</p>
          </div>
          <div class="badge">BlesProduction</div>
        </div>

        <div class="field">
          <input id="inputData" type="text" placeholder="Masukkan teks atau URL (contoh: https://bles-ai.vercel.app/)" />
        </div>

        <div class="btns">
          <button class="primary" id="generateBtn">Generate</button>
          <button id="downloadBtn">Download</button>
          <button id="printBtn">Print</button>
        </div>

        <!-- QR area with its own moving neon border -->
        <div class="neon-border" style="border-radius:18px; margin-top:14px;">
          <div class="qrwrap">
            <div id="qrcode" aria-label="QR Code"></div>

            <div class="check" id="check">
              <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </div>

            <div class="status" id="statusText"></div>
          </div>
        </div>

        <div class="foot">© <span id="year"></span> BlesProduction</div>
      </div>
    </div>
  </div>

<script>
  const inputData = document.getElementById("inputData");
  const qrcodeContainer = document.getElementById("qrcode");
  const statusText = document.getElementById("statusText");
  const check = document.getElementById("check");

  document.getElementById("year").textContent = new Date().getFullYear();

  function getQRImageSrc(){
    const img = qrcodeContainer.querySelector("img");
    if (img) return img.src;

    const canvas = qrcodeContainer.querySelector("canvas");
    if (canvas) return canvas.toDataURL("image/png");
    return null;
  }

  function showSuccess(msg){
    statusText.textContent = msg;
    check.style.display = "flex";
    // restart svg animation
    const svg = check.querySelector("svg");
    svg.style.animation = "none";
    // force reflow
    void svg.offsetWidth;
    svg.style.animation = "";
    // subtle vibration (mobile)
    if (navigator.vibrate) navigator.vibrate([40, 30, 60]);
  }

  function clearSuccess(){
    statusText.textContent = "";
    check.style.display = "none";
  }

  function generateQRCode() {
    const data = inputData.value.trim();
    if (!data) {
      alert("Masukkan teks atau URL terlebih dahulu.");
      return;
    }

    clearSuccess();
    qrcodeContainer.innerHTML = "";

    new QRCode(qrcodeContainer, {
      text: data,
      width: 240,
      height: 240,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    showSuccess("✔ QR Code berhasil dibuat");
  }

  function downloadQR() {
    const src = getQRImageSrc();
    if (!src) {
      alert("Generate QR terlebih dahulu.");
      return;
    }
    const a = document.createElement("a");
    a.href = src;
    a.download = "BlesProduction-QRCode.png";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function printQR() {
    const src = getQRImageSrc();
    if (!src) {
      alert("Generate QR terlebih dahulu.");
      return;
    }
    const w = window.open("");
    w.document.write(`
      <html><head><title>Print QR</title>
      <style>
        body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
        img{width:360px;height:360px}
      </style></head>
      <body><img src="${src}" onload="window.print();window.close()"/></body></html>
    `);
    w.document.close();
  }

  document.getElementById("generateBtn").addEventListener("click", generateQRCode);
  document.getElementById("downloadBtn").addEventListener("click", downloadQR);
  document.getElementById("printBtn").addEventListener("click", printQR);

  // Enter to generate
  inputData.addEventListener("keydown", (e) => {
    if (e.key === "Enter") generateQRCode();
  });
</script>
</body>
</html>
