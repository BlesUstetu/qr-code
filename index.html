<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlesProduction — QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root{
    --bg:#050713;
    --panel: rgba(10,14,28,.62);
    --text:#EAF0FF;
    --muted:#A6B0CC;
    --line: rgba(255,255,255,.10);
    --shadow: 0 20px 70px rgba(0,0,0,.55);

    --c1:#7C3AED;  /* violet */
    --c2:#22D3EE;  /* cyan */
    --c3:#34D399;  /* emerald */
    --c4:#F472B6;  /* pink */
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 20% 10%, rgba(124,58,237,.10), transparent 55%),
      radial-gradient(1000px 700px at 80% 30%, rgba(34,211,238,.08), transparent 55%),
      radial-gradient(1000px 700px at 50% 85%, rgba(52,211,153,.06), transparent 60%),
      var(--bg);
    overflow-x:hidden;
  }

  /* ====== SIDE-ONLY ANIMATION LAYER ====== */
  .space{
    position:fixed;
    inset:0;
    z-index:-5;
    pointer-events:none;
    user-select:none;
  }
  .space .center-calm{
    position:absolute; inset:0;
    background:
      radial-gradient(600px 420px at 50% 40%, rgba(255,255,255,.02), transparent 60%),
      radial-gradient(800px 560px at 50% 80%, rgba(255,255,255,.015), transparent 65%);
    opacity:.7;
  }
  .side{
    position:absolute; top:0; height:100%;
    width:22%;
    overflow:hidden;
  }
  .side.left{ left:0; background: radial-gradient(circle at left center, rgba(124,58,237,.10), transparent 70%); }
  .side.right{ right:0; background: radial-gradient(circle at right center, rgba(34,211,238,.10), transparent 70%); }

  .stars, .stars2, .stars3{
    position:absolute; inset:-220px;
    background-repeat: repeat;
    transform: translateZ(0);
    filter:none;
    opacity:.18;
    animation: drift 260s linear infinite;
  }
  .stars{
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.85) 50%, transparent 51%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,.65) 50%, transparent 51%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.75) 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 80% 85%, rgba(255,255,255,.60) 50%, transparent 51%);
    background-size: 260px 260px;
  }
  .stars2{
    opacity:.12;
    animation-duration: 360s;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,.60) 50%, transparent 51%),
      radial-gradient(1px 1px at 65% 75%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 25% 70%, rgba(255,255,255,.60) 50%, transparent 51%);
    background-size: 340px 340px;
  }
  .stars3{
    opacity:.08;
    animation-duration: 460s;
    background-image:
      radial-gradient(1px 1px at 20% 10%, rgba(255,255,255,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,.50) 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.45) 50%, transparent 51%),
      radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,.45) 50%, transparent 51%);
    background-size: 420px 420px;
  }
  @keyframes drift{
    from{ transform: translate3d(0,0,0); }
    to{ transform: translate3d(-160px, 110px, 0); }
  }

  .orbit{
    position:absolute; inset:-30%;
    border-radius:50%;
    opacity:.20;
    filter: blur(10px);
    background: conic-gradient(
      from 0deg,
      rgba(34,211,238,.35),
      rgba(124,58,237,.35),
      rgba(244,114,182,.30),
      rgba(52,211,153,.30),
      rgba(34,211,238,.35)
    );
    animation: spin 22s linear infinite;
  }
  .side.right .orbit{ animation-duration: 28s; opacity:.16; }
  .orbit::after{
    content:"";
    position:absolute; inset: 18%;
    border-radius:50%;
    background: conic-gradient(
      from 180deg,
      rgba(255,255,255,.05),
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,.04),
      rgba(255,255,255,0) 75%,
      rgba(255,255,255,.05)
    );
    filter: blur(6px);
    opacity:.8;
    animation: spin 36s linear infinite reverse;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .planet{
    position:absolute; border-radius:50%;
    opacity:.14;
    animation: float 34s ease-in-out infinite;
  }
  .planet.p1{
    width: 220px; height:220px;
    left: -120px; top: 24%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.16), transparent 40%),
      radial-gradient(circle at 45% 55%, rgba(34,211,238,.22), rgba(124,58,237,.10) 55%, rgba(0,0,0,.12) 75%);
  }
  .planet.p2{
    width: 160px; height:160px;
    right: -110px; top: 12%;
    background:
      radial-gradient(circle at 25% 25%, rgba(255,255,255,.14), transparent 38%),
      radial-gradient(circle at 40% 60%, rgba(244,114,182,.18), rgba(34,211,238,.08) 55%, rgba(0,0,0,.12) 78%);
    animation-duration: 40s;
  }
  .planet.p3{
    width: 260px; height:260px;
    right: -150px; bottom: -170px;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,.12), transparent 40%),
      radial-gradient(circle at 45% 55%, rgba(52,211,153,.16), rgba(124,58,237,.08) 60%, rgba(0,0,0,.12) 80%);
    opacity:.12;
    animation-duration: 46s;
  }
  @keyframes float{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    50%{ transform: translate(10px, -12px) rotate(4deg); }
  }

  .meteor-field{ position:absolute; inset:0; overflow:hidden; }
  .meteor{
    position:absolute;
    width: 190px; height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.60), rgba(255,255,255,0));
    opacity: 0;
    filter: blur(.15px);
  }
  .meteor::after{
    content:"";
    position:absolute; left:-140px; top:50%;
    transform: translateY(-50%);
    width: 140px; height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.20));
    opacity:.9;
  }

  .left .meteor{ transform: rotate(25deg); left:-60%; }
  .left .meteor:nth-child(1){ top: 12%; animation: meteorLeft 48s ease-in-out infinite; animation-delay: 10s; }
  .left .meteor:nth-child(2){ top: 32%; width: 230px; animation: meteorLeft 62s ease-in-out infinite; animation-delay: 26s; }
  .left .meteor:nth-child(3){ top: 48%; width: 170px; animation: meteorLeft 74s ease-in-out infinite; animation-delay: 38s; }
  @keyframes meteorLeft{
    0%, 93% { opacity:0; transform: translate3d(-40%, -20%, 0) rotate(25deg); }
    94% { opacity:.20; }
    96% { opacity:.42; }
    100% { opacity:0; transform: translate3d(40%, 40%, 0) rotate(25deg); }
  }

  .right .meteor{ transform: rotate(-25deg); right:-60%; }
  .right .meteor:nth-child(1){ top: 18%; animation: meteorRight 54s ease-in-out infinite; animation-delay: 14s; }
  .right .meteor:nth-child(2){ top: 36%; width: 230px; animation: meteorRight 66s ease-in-out infinite; animation-delay: 28s; }
  .right .meteor:nth-child(3){ top: 52%; width: 170px; animation: meteorRight 78s ease-in-out infinite; animation-delay: 44s; }
  @keyframes meteorRight{
    0%, 93% { opacity:0; transform: translate3d(40%, -20%, 0) rotate(-25deg); }
    94% { opacity:.18; }
    96% { opacity:.40; }
    100% { opacity:0; transform: translate3d(-40%, 40%, 0) rotate(-25deg); }
  }

  /* ====== UI ====== */
  .wrap{
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 42px 18px;
    position: relative;
    z-index: 5;
  }
  .panel{
    width: min(520px, 100%);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }
  .neon-border{
    position:relative;
    border-radius: 22px;
  }
  .neon-border::before{
    content:"";
    position:absolute; inset:-2px;
    border-radius: inherit;
    background: conic-gradient(from 0deg, var(--c2), var(--c1), var(--c4), var(--c3), var(--c2));
    filter: blur(6px);
    opacity: .16;
    animation: spinCard 10s linear infinite;
    z-index:-2;
  }
  .neon-border::after{
    content:"";
    position:absolute; inset:-1px;
    border-radius: inherit;
    background: conic-gradient(from 0deg,
      rgba(34,211,238,.75),
      rgba(124,58,237,.75),
      rgba(244,114,182,.75),
      rgba(52,211,153,.75),
      rgba(34,211,238,.75)
    );
    animation: spinCard 12s linear infinite;
    z-index:-1;
    opacity:.45;
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    padding: 2px;
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  @keyframes spinCard{ to{ transform: rotate(360deg); } }

  .head{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom: 10px;
  }
  .title h1{
    margin:0;
    font-size: 18px;
    letter-spacing:.2px;
  }
  .badge{
    font-size:12px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: rgba(234,240,255,.92);
    white-space:nowrap;
  }

  /* Input w/ clear */
  .inputWrap{ position:relative; margin-top: 10px; }
  input{
    width:100%;
    padding: 12px 42px 12px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.30);
    color: var(--text);
    outline:none;
    font-size: 15px;
  }
  input:focus{
    border-color: rgba(34,211,238,.45);
    box-shadow: 0 0 0 4px rgba(34,211,238,.10);
  }
  .clearBtn{
    position:absolute; right:10px; top:50%;
    transform: translateY(-50%);
    width: 28px; height:28px;
    border-radius: 10px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: rgba(234,240,255,.92);
    cursor:pointer;
  }

  .btns{ display:flex; gap:10px; margin-top: 12px; }
  button{
    flex:1;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 14px;
    cursor:pointer;
    font-weight: 800;
    letter-spacing:.2px;
    transition: transform .12s ease, background .12s ease;
  }
  button:hover{ transform: translateY(-1px); background: rgba(255,255,255,.12); }
  button:disabled{ opacity:.55; cursor:not-allowed; transform:none; }
  .primary{
    background: linear-gradient(135deg, rgba(34,211,238,.20), rgba(124,58,237,.20));
    border-color: rgba(34,211,238,.30);
  }

  /* Loading small (no overlay) */
  .miniLoad{
    display:none;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top: 10px;
    color: rgba(166,176,204,.92);
    font-size: 13px;
  }
  .dot{
    width:7px;height:7px;border-radius:999px;
    background: rgba(34,211,238,.9);
    animation: pulse .9s infinite ease-in-out;
  }
  .dot:nth-child(2){ animation-delay:.15s; opacity:.8 }
  .dot:nth-child(3){ animation-delay:.3s; opacity:.6 }
  @keyframes pulse{
    0%,100%{ transform: translateY(0); opacity:.55; }
    50%{ transform: translateY(-4px); opacity:1; }
  }

  .qrwrap{
    margin-top: 14px;
    padding: 14px;
    border-radius: 18px;
    background: rgba(0,0,0,.28);
    border:1px solid rgba(255,255,255,.10);
    text-align:center;
  }
  #qrcode{
    display:inline-block;
    background:#fff;
    border-radius:14px;
    padding: 12px;
    box-shadow: 0 14px 40px rgba(0,0,0,.45);
  }
  #qrcode img, #qrcode canvas{ display:block; border-radius:10px; }

  .status{
    margin-top: 10px;
    font-size: 13px;
    color: rgba(166,176,204,.95);
    min-height: 18px;
  }

  .check{
    width: 56px; height:56px;
    margin: 8px auto 0;
    border-radius: 50%;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(52,211,153,.10);
    border: 1px solid rgba(52,211,153,.30);
    box-shadow: 0 0 26px rgba(52,211,153,.14);
  }
  .check svg{
    width: 30px; height:30px;
    stroke: rgba(52,211,153,.95);
    stroke-width: 3.5;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:48;
    stroke-dashoffset:48;
    animation: draw .55s ease forwards;
  }
  @keyframes draw{ to{ stroke-dashoffset: 0; } }

  .foot{
    margin-top: 14px;
    color: rgba(166,176,204,.75);
    font-size: 12px;
    text-align:center;
  }

  body.scan-focus .side{ opacity:.80; transition: opacity .35s ease; }

  @media (max-width: 520px){
    .side{ width:16%; }
    .panel{ padding: 18px; }
  }

  @media print{
    body{ background:#fff; color:#000; }
    .space, .head, .inputWrap, .btns, .miniLoad, .status, .foot{ display:none !important; }
    .panel{ box-shadow:none; border:none; background:transparent; }
    .qrwrap{ border:none; background:transparent; }
    #qrcode{ box-shadow:none; }
  }
</style>
</head>

<body>
  <div class="space">
    <div class="center-calm"></div>

    <div class="side left">
      <div class="stars"></div><div class="stars2"></div><div class="stars3"></div>
      <div class="orbit"></div>
      <div class="planet p1"></div>
      <div class="meteor-field left">
        <span class="meteor"></span><span class="meteor"></span><span class="meteor"></span>
      </div>
    </div>

    <div class="side right">
      <div class="stars"></div><div class="stars2"></div><div class="stars3"></div>
      <div class="orbit"></div>
      <div class="planet p2"></div><div class="planet p3"></div>
      <div class="meteor-field right">
        <span class="meteor"></span><span class="meteor"></span><span class="meteor"></span>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="neon-border">
      <div class="panel">
        <div class="head">
          <div class="title"><h1>QR Generator</h1></div>
          <div class="badge">BlesProduction</div>
        </div>

        <div class="inputWrap">
          <input id="inputData" type="text" placeholder="Masukkan teks atau URL" autocomplete="off" />
          <button class="clearBtn" id="clearBtn" title="Clear">×</button>
        </div>

        <div class="btns">
          <button class="primary" id="generateBtn">Generate</button>
          <button id="copyBtn" disabled>Copy</button>
          <button id="downloadBtn" disabled>Download</button>
          <button id="printBtn" disabled>Print</button>
        </div>

        <div class="miniLoad" id="miniLoad" aria-hidden="true">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span>Sedang membuat QR…</span>
        </div>

        <div class="neon-border" style="border-radius:18px; margin-top:12px;">
          <div class="qrwrap">
            <div id="qrcode" aria-label="QR Code"></div>

            <div class="check" id="check">
              <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" /></svg>
            </div>

            <div class="status" id="statusText"></div>
          </div>
        </div>

        <div class="foot">© <span id="year"></span> BlesProduction</div>
      </div>
    </div>
  </div>

<script>
  const inputData = document.getElementById("inputData");
  const qrcodeContainer = document.getElementById("qrcode");
  const statusText = document.getElementById("statusText");
  const check = document.getElementById("check");
  const miniLoad = document.getElementById("miniLoad");

  const btnGenerate = document.getElementById("generateBtn");
  const btnCopy = document.getElementById("copyBtn");
  const btnDownload = document.getElementById("downloadBtn");
  const btnPrint = document.getElementById("printBtn");
  const btnClear = document.getElementById("clearBtn");

  document.getElementById("year").textContent = new Date().getFullYear();

  function setEnabled(hasQR){
    btnCopy.disabled = !hasQR;
    btnDownload.disabled = !hasQR;
    btnPrint.disabled = !hasQR;
  }

  function getQRImageSrc(){
    const img = qrcodeContainer.querySelector("img");
    if (img) return img.src;
    const canvas = qrcodeContainer.querySelector("canvas");
    if (canvas) return canvas.toDataURL("image/png");
    return null;
  }

  async function copyQR(){
    const src = getQRImageSrc();
    if (!src) return;
    try{
      const res = await fetch(src);
      const blob = await res.blob();
      await navigator.clipboard.write([
        new ClipboardItem({ [blob.type]: blob })
      ]);
      statusText.textContent = "✅ QR tersalin (image)";
      if (navigator.vibrate) navigator.vibrate(40);
    } catch {
      statusText.textContent = "Copy image tidak didukung. (Coba Download)";
    }
  }

  function showSuccess(msg){
    statusText.textContent = msg;
    check.style.display = "flex";

    const svg = check.querySelector("svg");
    svg.style.animation = "none";
    void svg.offsetWidth;
    svg.style.animation = "";

    if (navigator.vibrate) navigator.vibrate([40, 30, 60]);

    document.body.classList.add("scan-focus");
    setTimeout(()=>document.body.classList.remove("scan-focus"), 1200);
  }

  function clearUI(){
    statusText.textContent = "";
    check.style.display = "none";
    miniLoad.style.display = "none";
    setEnabled(false);
  }

  function setLoading(on){
    miniLoad.style.display = on ? "flex" : "none";
    btnGenerate.disabled = on;
  }

  function generateQRCode(){
    const data = inputData.value.trim();
    if (!data) {
      alert("Masukkan teks atau URL terlebih dahulu.");
      return;
    }

    clearUI();
    setLoading(true);

    // kecil delay biar animasi loading terlihat halus
    setTimeout(() => {
      qrcodeContainer.innerHTML = "";
      new QRCode(qrcodeContainer, {
        text: data,
        width: 240,
        height: 240,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });

      setLoading(false);
      setEnabled(true);
      showSuccess("✔ QR berhasil dibuat");
    }, 220);
  }

  function downloadQR(){
    const src = getQRImageSrc();
    if (!src) return alert("Generate QR terlebih dahulu.");
    const a = document.createElement("a");
    a.href = src;
    a.download = "BlesProduction-QRCode.png";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function printQR(){
    const src = getQRImageSrc();
    if (!src) return alert("Generate QR terlebih dahulu.");
    const w = window.open("");
    w.document.write(`
      <html><head><title>Print QR</title>
      <style>
        body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
        img{width:360px;height:360px}
      </style></head>
      <body><img src="${src}" onload="window.print();window.close()"/></body></html>
    `);
    w.document.close();
  }

  function clearAll(){
    inputData.value = "";
    qrcodeContainer.innerHTML = "";
    clearUI();
    inputData.focus();
  }

  btnGenerate.addEventListener("click", generateQRCode);
  btnDownload.addEventListener("click", downloadQR);
  btnPrint.addEventListener("click", printQR);
  btnCopy.addEventListener("click", copyQR);
  btnClear.addEventListener("click", clearAll);

  inputData.addEventListener("keydown", (e) => {
    if (e.key === "Enter") generateQRCode();
    if (e.key === "Escape") clearAll();
  });

  // init state
  clearUI();
</script>
</body>
</html>
