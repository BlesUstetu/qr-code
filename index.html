<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlesProduction</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root{
    --bg:#070A12;
    --panel: rgba(17,24,39,.82);
    --text:#EAF0FF;
    --muted:#A6B0CC;
    --line: rgba(255,255,255,.10);
    --shadow: 0 20px 70px rgba(0,0,0,.55);
    --radius: 22px;

    --c1:#7C3AED;  /* violet */
    --c2:#22D3EE;  /* cyan */
    --c3:#34D399;  /* emerald */
    --c4:#F472B6;  /* pink */
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }

  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 20% 10%, rgba(124,58,237,.10), transparent 55%),
      radial-gradient(1000px 700px at 80% 30%, rgba(34,211,238,.08), transparent 55%),
      radial-gradient(1000px 700px at 50% 85%, rgba(52,211,153,.06), transparent 60%),
      var(--bg);
  }

  .wrap{
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 42px 18px;
  }

  /* Modern static neon frame (NO animation) */
  .frame{
    width: min(520px, 100%);
    border-radius: var(--radius);
    padding: 2px; /* border thickness */
    background: linear-gradient(135deg, rgba(34,211,238,.65), rgba(124,58,237,.65), rgba(244,114,182,.55), rgba(52,211,153,.55));
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
  }

  .panel{
    border-radius: calc(var(--radius) - 2px);
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 22px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .head{
    display:flex;
    gap:12px;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom: 14px;
  }
  .title{ text-align:left; line-height:1.15; }
  .title h1{
    margin:0;
    font-size: 20px;
    letter-spacing:.2px;
  }
  .title p{
    margin: 8px 0 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .badge{
    font-size:12px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: rgba(234,240,255,.92);
    white-space:nowrap;
  }

  .field{ display:flex; gap:10px; margin-top: 14px; }
  input{
    flex:1;
    width:100%;
    padding: 12px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.30);
    color: var(--text);
    outline: none;
    font-size: 15px;
  }
  input::placeholder{ color: rgba(166,176,204,.75); }
  input:focus{
    border-color: rgba(34,211,238,.45);
    box-shadow: 0 0 0 4px rgba(34,211,238,.10);
  }

  .btns{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top: 12px;
  }
  button{
    flex:1;
    min-width: 120px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 14px;
    cursor:pointer;
    font-weight: 700;
    letter-spacing:.2px;
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
  }
  button:hover{
    transform: translateY(-1px);
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.18);
  }
  button:active{ transform: translateY(0); }

  .primary{
    background: linear-gradient(135deg, rgba(34,211,238,.18), rgba(124,58,237,.18));
    border-color: rgba(34,211,238,.30);
  }

  /* QR box + static border */
  .qrframe{
    margin-top: 14px;
    border-radius: 18px;
    padding: 2px;
    background: linear-gradient(135deg, rgba(34,211,238,.45), rgba(124,58,237,.45), rgba(244,114,182,.35), rgba(52,211,153,.35));
  }
  .qrwrap{
    border-radius: 16px;
    padding: 14px;
    background: rgba(0,0,0,.28);
    border:1px solid rgba(255,255,255,.10);
    text-align:center;
  }

  #qrcode{
    display:inline-block;
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 14px 40px rgba(0,0,0,.45);
  }
  #qrcode img, #qrcode canvas{
    display:block;
    border-radius: 10px;
  }

  .status{
    margin-top: 10px;
    font-size: 13px;
    color: rgba(166,176,204,.95);
    min-height: 18px;
  }

  /* success check (static, no animation) */
  .check{
    width: 58px; height:58px;
    margin: 10px auto 0;
    border-radius: 50%;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(52,211,153,.10);
    border: 1px solid rgba(52,211,153,.30);
    box-shadow: 0 0 26px rgba(52,211,153,.14);
  }
  .check svg{
    width: 30px; height:30px;
    stroke: rgba(52,211,153,.95);
    stroke-width: 3.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .foot{
    margin-top: 16px;
    color: rgba(166,176,204,.75);
    font-size: 12px;
    text-align:center;
  }

  @media (max-width:420px){
    .panel{ padding: 18px; }
    button{ min-width: 0; }
  }

  @media print{
    body{ background:#fff; color:#000; }
    .head, .field, .btns, .status, .foot{ display:none !important; }
    .frame{ box-shadow:none; background: transparent; padding:0; }
    .panel{ box-shadow:none; border:none; background:transparent; }
    .qrframe{ background:transparent; padding:0; }
    .qrwrap{ border:none; background:transparent; }
    #qrcode{ box-shadow:none; }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="frame">
      <div class="panel">
        <div class="head">
          <div class="title">
            <h1>QR Code Generator</h1>
          </div>
          <div class="badge">BlesProduction</div>
        </div>

        <div class="field">
          <input id="inputData" type="text" placeholder="Masukkan teks atau URL" />
        </div>

        <div class="btns">
          <button class="primary" id="generateBtn">Generate</button>
          <button id="downloadBtn">Download</button>
          <button id="printBtn">Print</button>
          <button id="clearBtn">Clear</button>
        </div>

        <div class="qrframe">
          <div class="qrwrap">
            <div id="qrcode" aria-label="QR Code"></div>

            <div class="check" id="check">
              <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </div>

            <div class="status" id="statusText"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
  const inputData = document.getElementById("inputData");
  const qrcodeContainer = document.getElementById("qrcode");
  const statusText = document.getElementById("statusText");
  const check = document.getElementById("check");

  document.getElementById("year").textContent = new Date().getFullYear();

  function getQRImageSrc(){
    const img = qrcodeContainer.querySelector("img");
    if (img) return img.src;

    const canvas = qrcodeContainer.querySelector("canvas");
    if (canvas) return canvas.toDataURL("image/png");

    return null;
  }

  function setStatus(msg, ok=false){
    statusText.textContent = msg || "";
    check.style.display = ok ? "flex" : "none";
    // vibration on success (mobile)
    if (ok && navigator.vibrate) navigator.vibrate([40, 30, 60]);
  }

  function generateQRCode() {
    const data = inputData.value.trim();
    if (!data) {
      alert("Masukkan teks atau URL terlebih dahulu.");
      return;
    }

    qrcodeContainer.innerHTML = "";
    setStatus("", false);

    new QRCode(qrcodeContainer, {
      text: data,
      width: 240,
      height: 240,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    setStatus("✔ QR Code berhasil dibuat", true);
  }

  function downloadQR() {
    const src = getQRImageSrc();
    if (!src) return alert("Generate QR terlebih dahulu.");
    const a = document.createElement("a");
    a.href = src;
    a.download = "BlesProduction-QRCode.png";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function printQR() {
    const src = getQRImageSrc();
    if (!src) return alert("Generate QR terlebih dahulu.");
    const w = window.open("");
    w.document.write(`
      <html><head><title>Print QR</title>
      <style>
        body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
        img{width:360px;height:360px}
      </style></head>
      <body><img src="${src}" onload="window.print();window.close()"/></body></html>
    `);
    w.document.close();
  }

  function clearAll(){
    inputData.value = "";
    qrcodeContainer.innerHTML = "";
    setStatus("", false);
    inputData.focus();
  }

  document.getElementById("generateBtn").addEventListener("click", generateQRCode);
  document.getElementById("downloadBtn").addEventListener("click", downloadQR);
  document.getElementById("printBtn").addEventListener("click", printQR);
  document.getElementById("clearBtn").addEventListener("click", clearAll);

  // Enter to generate
  inputData.addEventListener("keydown", (e) => {
    if (e.key === "Enter") generateQRCode();
    if (e.key === "Escape") clearAll();
  });
</script>
</body>
</html>
