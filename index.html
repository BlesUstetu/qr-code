<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlesProduction — Ultra Minimal Space QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root{
    --bg:#050713;
    --panel: rgba(10,14,28,.62);
    --text:#EAF0FF;
    --muted:#A6B0CC;
    --line: rgba(255,255,255,.10);
    --shadow: 0 20px 70px rgba(0,0,0,.55);

    --c1:#7C3AED;  /* violet */
    --c2:#22D3EE;  /* cyan */
    --c3:#34D399;  /* emerald */
    --c4:#F472B6;  /* pink */
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    color: var(--text);
    background: radial-gradient(1200px 800px at 20% 10%, rgba(124,58,237,.12), transparent 55%),
                radial-gradient(1000px 700px at 80% 30%, rgba(34,211,238,.10), transparent 55%),
                radial-gradient(1000px 700px at 50% 85%, rgba(52,211,153,.08), transparent 60%),
                var(--bg);
    overflow-x:hidden;
  }

  /* ====== SPACE BACKGROUND (ULTRA MINIMAL) ====== */
  .space{
    position:fixed; inset:0;
    z-index:-5;
    pointer-events:none;
    user-select:none;
    opacity: 1;
  }

  .stars, .stars2, .stars3{
    position:absolute; inset:-240px;
    background-repeat: repeat;
    transform: translateZ(0);
    pointer-events:none;
    user-select:none;
    filter:none;
  }

  .stars{
    opacity:.18;
    animation: drift 220s linear infinite;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.85) 50%, transparent 51%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,.65) 50%, transparent 51%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.75) 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 80% 85%, rgba(255,255,255,.60) 50%, transparent 51%);
    background-size: 260px 260px;
  }

  .stars2{
    opacity:.12;
    animation: drift 320s linear infinite;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,.60) 50%, transparent 51%),
      radial-gradient(1px 1px at 65% 75%, rgba(255,255,255,.70) 50%, transparent 51%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 25% 70%, rgba(255,255,255,.60) 50%, transparent 51%);
    background-size: 340px 340px;
  }

  .stars3{
    opacity:.08;
    animation: drift 420s linear infinite;
    background-image:
      radial-gradient(1px 1px at 20% 10%, rgba(255,255,255,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,.50) 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.45) 50%, transparent 51%),
      radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,.45) 50%, transparent 51%);
    background-size: 420px 420px;
  }

  @keyframes drift{
    from{ transform: translate3d(0,0,0); }
    to{ transform: translate3d(-180px, 120px, 0); }
  }

  .twinkle{
    position:absolute; inset:0;
    background:
      radial-gradient(700px 450px at 15% 20%, rgba(255,255,255,.05), transparent 60%),
      radial-gradient(600px 400px at 85% 30%, rgba(255,255,255,.04), transparent 62%),
      radial-gradient(800px 520px at 45% 90%, rgba(255,255,255,.03), transparent 64%);
    animation: tw 12s ease-in-out infinite;
    opacity:.10;
    pointer-events:none;
    user-select:none;
  }
  @keyframes tw{
    0%,100%{ opacity:.08; }
    50%{ opacity:.12; }
  }

  /* Planets ultra minimal (tidak mengganggu) */
  .planet{
    position:absolute;
    border-radius:50%;
    transform: translateZ(0);
    opacity:.10;
    pointer-events:none;
    user-select:none;
    filter:none;
  }
  .planet.p1{
    width: 220px; height:220px;
    left: -150px; top: 22%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 40%),
      radial-gradient(circle at 45% 55%, rgba(34,211,238,.22), rgba(124,58,237,.10) 55%, rgba(0,0,0,.12) 75%);
    animation: float1 28s ease-in-out infinite;
  }
  .planet.p2{
    width: 160px; height:160px;
    right: -150px; top: 12%;
    background:
      radial-gradient(circle at 25% 25%, rgba(255,255,255,.16), transparent 38%),
      radial-gradient(circle at 40% 60%, rgba(244,114,182,.18), rgba(34,211,238,.08) 55%, rgba(0,0,0,.12) 78%);
    animation: float2 32s ease-in-out infinite;
  }
  .planet.p3{
    width: 260px; height:260px;
    right: 12%; bottom: -210px;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,.14), transparent 40%),
      radial-gradient(circle at 45% 55%, rgba(52,211,153,.16), rgba(124,58,237,.08) 60%, rgba(0,0,0,.12) 80%);
    animation: float3 36s ease-in-out infinite;
    opacity:.09;
  }

  @keyframes float1{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    50%{ transform: translate(12px, -14px) rotate(4deg); }
  }
  @keyframes float2{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    50%{ transform: translate(-10px, 12px) rotate(-4deg); }
  }
  @keyframes float3{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    50%{ transform: translate(8px, -12px) rotate(3deg); }
  }

  /* ====== RARE METEOR ====== */
  .meteor-field{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:-4;
    pointer-events:none;
    user-select:none;
  }

  .meteor{
    position:absolute;
    top:-20%;
    left:-30%;
    width: 180px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.65), rgba(255,255,255,0));
    transform: rotate(25deg);
    opacity: 0;
    filter: blur(.15px);
    animation-name: meteorFly;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    pointer-events:none;
    user-select:none;
  }

  .meteor::after{
    content:"";
    position:absolute;
    left:-140px;
    top:50%;
    transform: translateY(-50%);
    width: 140px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.22));
    opacity: .9;
  }

  .meteor-field .meteor:nth-child(1){
    top: 14%;
    animation-duration: 42s;
    animation-delay: 12s;
  }
  .meteor-field .meteor:nth-child(2){
    top: 30%;
    width: 220px;
    animation-duration: 56s;
    animation-delay: 24s;
  }
  .meteor-field .meteor:nth-child(3){
    top: 46%;
    width: 160px;
    animation-duration: 68s;
    animation-delay: 36s;
  }

  @keyframes meteorFly{
    0%, 93% { opacity: 0; transform: translate3d(-30vw,-10vh,0) rotate(25deg); }
    94% { opacity: .22; }
    96% { opacity: .42; }
    100%{
      opacity: 0;
      transform: translate3d(140vw, 70vh, 0) rotate(25deg);
    }
  }

  /* ====== LAYOUT ====== */
  .wrap{
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 42px 18px;
    position: relative;
    z-index: 5;
  }

  .panel{
    width: min(520px, 100%);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    position:relative;
  }

  /* ====== NEON MOVING BORDER (SUBTLE) ====== */
  .neon-border{
    position:relative;
    border-radius: 22px;
  }
  .neon-border::before{
    content:"";
    position:absolute; inset:-2px;
    border-radius: inherit;
    background: conic-gradient(
      from 0deg,
      var(--c2),
      var(--c1),
      var(--c4),
      var(--c3),
      var(--c2)
    );
    filter: blur(6px);
    opacity: .16;
    animation: spin 10s linear infinite;
    z-index:-2;
  }
  .neon-border::after{
    content:"";
    position:absolute; inset:-1px;
    border-radius: inherit;
    background: conic-gradient(
      from 0deg,
      rgba(34,211,238,.75),
      rgba(124,58,237,.75),
      rgba(244,114,182,.75),
      rgba(52,211,153,.75),
      rgba(34,211,238,.75)
    );
    animation: spin 12s linear infinite;
    z-index:-1;
    opacity:.45;
    mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    padding: 2px;
    box-sizing: border-box;
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  @keyframes spin{
    to{ transform: rotate(360deg); }
  }

  /* header */
  .head{
    display:flex;
    gap:12px;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom: 14px;
  }
  .title{
    text-align:left;
    line-height:1.1;
  }
  .title h1{
    margin:0;
    font-size: 20px;
    letter-spacing:.2px;
  }
  .title p{
    margin: 8px 0 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .badge{
    font-size:12px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: rgba(234,240,255,.92);
    white-space:nowrap;
  }

  .field{ display:flex; gap:10px; margin-top: 14px; }
  input{
    flex:1;
    width:100%;
    padding: 12px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.30);
    color: var(--text);
    outline: none;
    font-size: 15px;
  }
  input::placeholder{ color: rgba(166,176,204,.75); }
  input:focus{
    border-color: rgba(34,211,238,.45);
    box-shadow: 0 0 0 4px rgba(34,211,238,.10);
  }

  .btns{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top: 12px;
  }
  button{
    flex:1;
    min-width: 120px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 14px;
    cursor:pointer;
    font-weight: 700;
    letter-spacing:.2px;
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
  }
  button:hover{
    transform: translateY(-1px);
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.18);
  }
  button:active{ transform: translateY(0); }

  .primary{
    background: linear-gradient(135deg, rgba(34,211,238,.18), rgba(124,58,237,.18));
    border-color: rgba(34,211,238,.30);
  }

  /* QR box with its own neon border */
  .qrwrap{
    margin-top: 16px;
    padding: 14px;
    border-radius: 18px;
    background: rgba(0,0,0,.28);
    border:1px solid rgba(255,255,255,.10);
    text-align:center;
  }
  #qrcode{
    display:inline-block;
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 14px 40px rgba(0,0,0,.45);
  }
  #qrcode img, #qrcode canvas{
    display:block;
    border-radius: 10px;
  }

  .status{
    margin-top: 10px;
    font-size: 13px;
    color: rgba(166,176,204,.95);
    min-height: 18px;
  }

  /* success check animation */
  .check{
    width: 58px; height:58px;
    margin: 8px auto 0;
    border-radius: 50%;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(52,211,153,.10);
    border: 1px solid rgba(52,211,153,.30);
    box-shadow: 0 0 26px rgba(52,211,153,.14);
  }
  .check svg{
    width: 30px; height:30px;
    stroke: rgba(52,211,153,.95);
    stroke-width: 3.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 48;
    stroke-dashoffset: 48;
    animation: draw .55s ease forwards;
  }
  @keyframes draw{ to{ stroke-dashoffset: 0; } }

  .foot{
    margin-top: 16px;
    color: rgba(166,176,204,.75);
    font-size: 12px;
    text-align:center;
  }

  /* Scan focus: redupkan background sesaat */
  body.scan-focus .space{ opacity: .65; transition: opacity .35s ease; }

  @media (max-width:420px){
    .panel{ padding: 18px; }
    button{ min-width: 0; }
  }

  @media print{
    body{ background:#fff; color:#000; }
    .space, .head, .field, .btns, .status, .foot{ display:none !important; }
    .panel{ box-shadow:none; border:none; background:transparent; }
    .qrwrap{ border:none; background:transparent; }
    #qrcode{ box-shadow:none; }
  }
</style>
</head>

<body>
  <!-- SPACE BACKGROUND -->
  <div class="space">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    <div class="twinkle"></div>

    <div class="planet p1"></div>
    <div class="planet p2"></div>
    <div class="planet p3"></div>

    <!-- Rare meteor -->
    <div class="meteor-field">
      <span class="meteor"></span>
      <span class="meteor"></span>
      <span class="meteor"></span>
    </div>
  </div>

  <div class="wrap">
    <div class="neon-border">
      <div class="panel">
        <div class="head">
          <div class="title">
            <h1>QR Code Generator</h1>
            <p>Ultra minimal space • neon border halus • meteor jarang muncul</p>
          </div>
          <div class="badge">BlesProduction</div>
        </div>

        <div class="field">
          <input id="inputData" type="text" placeholder="Masukkan teks atau URL (contoh: https://bles-ai.vercel.app/)" />
        </div>

        <div class="btns">
          <button class="primary" id="generateBtn">Generate</button>
          <button id="downloadBtn">Download</button>
          <button id="printBtn">Print</button>
        </div>

        <div class="neon-border" style="border-radius:18px; margin-top:14px;">
          <div class="qrwrap">
            <div id="qrcode" aria-label="QR Code"></div>

            <div class="check" id="check">
              <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </div>

            <div class="status" id="statusText"></div>
          </div>
        </div>

        <div class="foot">© <span id="year"></span> BlesProduction</div>
      </div>
    </div>
  </div>

<script>
  const inputData = document.getElementById("inputData");
  const qrcodeContainer = document.getElementById("qrcode");
  const statusText = document.getElementById("statusText");
  const check = document.getElementById("check");

  document.getElementById("year").textContent = new Date().getFullYear();

  function getQRImageSrc(){
    const img = qrcodeContainer.querySelector("img");
    if (img) return img.src;

    const canvas = qrcodeContainer.querySelector("canvas");
    if (canvas) return canvas.toDataURL("image/png");
    return null;
  }

  function showSuccess(msg){
    statusText.textContent = msg;
    check.style.display = "flex";

    // restart svg animation
    const svg = check.querySelector("svg");
    svg.style.animation = "none";
    void svg.offsetWidth;
    svg.style.animation = "";

    // subtle vibration (mobile)
    if (navigator.vibrate) navigator.vibrate([40, 30, 60]);

    // scan focus: redupkan bg sebentar
    document.body.classList.add("scan-focus");
    setTimeout(()=>document.body.classList.remove("scan-focus"), 1500);
  }

  function clearSuccess(){
    statusText.textContent = "";
    check.style.display = "none";
  }

  function generateQRCode() {
    const data = inputData.value.trim();
    if (!data) {
      alert("Masukkan teks atau URL terlebih dahulu.");
      return;
    }

    clearSuccess();
    qrcodeContainer.innerHTML = "";

    new QRCode(qrcodeContainer, {
      text: data,
      width: 240,
      height: 240,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    showSuccess("✔ QR Code berhasil dibuat");
  }

  function downloadQR() {
    const src = getQRImageSrc();
    if (!src) {
      alert("Generate QR terlebih dahulu.");
      return;
    }
    const a = document.createElement("a");
    a.href = src;
    a.download = "BlesProduction-QRCode.png";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function printQR() {
    const src = getQRImageSrc();
    if (!src) {
      alert("Generate QR terlebih dahulu.");
      return;
    }
    const w = window.open("");
    w.document.write(`
      <html><head><title>Print QR</title>
      <style>
        body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
        img{width:360px;height:360px}
      </style></head>
      <body><img src="${src}" onload="window.print();window.close()"/></body></html>
    `);
    w.document.close();
  }

  document.getElementById("generateBtn").addEventListener("click", generateQRCode);
  document.getElementById("downloadBtn").addEventListener("click", downloadQR);
  document.getElementById("printBtn").addEventListener("click", printQR);

  // Enter to generate
  inputData.addEventListener("keydown", (e) => {
    if (e.key === "Enter") generateQRCode();
  });
</script>
</body>
</html>
